# Auto-label PRs based on changed files
# https://github.com/actions/labeler

go:
  - changed-files:
      - any:
          - 'internal/**/*.go'
          - 'pkg/**/*.go'
          - 'main.go'
          - 'app.go'
          - 'go.mod'
          - 'go.sum'

frontend:
  - changed-files:
      - any:
          - 'frontend/src/**/*.{ts,tsx,css,json}'
          - 'frontend/package.json'
          - 'frontend/package-lock.json'
          - 'frontend/vite.config.ts'
          - 'frontend/index.html'

ci:
  - changed-files:
      - any:
          - '.github/**'

documentation:
  - changed-files:
      - any:
          - '**/*.md'
          - 'docs/**'

tests:
  - changed-files:
      - any:
          - '**/*_test.go'
          - 'frontend/e2e/**'
          - 'frontend/src/**/*.{test,spec}.{ts,tsx}'

dependencies:
  - changed-files:
      - any:
          - 'go.mod'
          - 'go.sum'
          - 'frontend/package.json'
          - 'frontend/package-lock.json'
          - 'frontend/yarn.lock'

config:
  - changed-files:
      - any:
          - '**.{json,yaml,yml,toml}'
          - '!.github/**'
          - '!frontend/package.json'
          - '!frontend/package-lock.json'
