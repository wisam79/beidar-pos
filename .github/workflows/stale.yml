name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 8 * * 1'  # كل إثنين 8 صباحاً
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale Items
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          # ── Issues ──────────────────────────────────────────────────
          stale-issue-message: >
            ⏰ هذه المشكلة لم يتم النشاط عليها منذ 30 يوماً. 
            سيتم إغلاقها تلقائياً خلال 7 أيام ما لم يتم تحديثها.
          close-issue-message: >
            ❌ تم إغلاق هذه المشكلة تلقائياً لعدم النشاط.
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: stale
          exempt-issue-labels: pinned,security,bug,enhancement

          # ── PRs ─────────────────────────────────────────────────────
          stale-pr-message: >
            ⏰ هذا الـ PR لم يتم النشاط عليه منذ 21 يوماً. 
            سيتم إغلاقه تلقائياً خلال 7 أيام ما لم يتم تحديثه.
          close-pr-message: >
            ❌ تم إغلاق هذا الـ PR تلقائياً لعدم النشاط.
          days-before-pr-stale: 21
          days-before-pr-close: 7
          stale-pr-label: stale
          exempt-pr-labels: pinned,security,wip

          # ── Common ──────────────────────────────────────────────────
          operations-per-run: 100
          ascending: true
          delete-branch: true
