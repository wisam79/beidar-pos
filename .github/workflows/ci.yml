name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # 1. Go Backend: build, vet, test, vulncheck, lint
  # ═══════════════════════════════════════════════════════════════════
  go-backend:
    name: Go Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Lint
        run: golangci-lint run --timeout=5m ./...

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Vulnerability Check
        run: govulncheck ./...

      - name: Test with Race Detection
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: coverage.out

  # ═══════════════════════════════════════════════════════════════════
  # 2. React Frontend: typecheck, lint, test
  # ═══════════════════════════════════════════════════════════════════
  frontend:
    name: React Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: node-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit Tests with Coverage
        run: npm run test:ci -- --coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Bundle Size Analysis
        run: |
          npx vite build
          echo "=== Bundle Size ==="
          du -sh dist/ 2>/dev/null || echo "No dist folder"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/dist/

  # ═══════════════════════════════════════════════════════════════════
  # 3. Playwright E2E Tests (مع Vite dev server)
  # ═══════════════════════════════════════════════════════════════════
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/

  # ═══════════════════════════════════════════════════════════════════
  # 4. Dependency Review (على الـ PRs فقط — منع الحزم الخطرة)
  # ═══════════════════════════════════════════════════════════════════
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Unlicense, 0BSD

  # ═══════════════════════════════════════════════════════════════════
  # 5. CodeQL Security Analysis (تحليل ثغرات متقدم)
  # ═══════════════════════════════════════════════════════════════════
  codeql:
    name: CodeQL Analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - uses: github/codeql-action/init@v3
        with:
          languages: go, javascript-typescript
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go,/language:javascript-typescript"
