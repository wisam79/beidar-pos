name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read
  attestations: write
  id-token: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # بناء Windows Installer
  # ═══════════════════════════════════════════════════════════════════
  build-windows:
    name: Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails App
        run: wails build -platform windows/amd64 -o beidar-desktop.exe -clean
        env:
          NODE_ENV: production

      - name: Sign Binary (إذا توفر المفتاح)
        if: env.SIGNING_CERT != ''
        shell: pwsh
        run: |
          Add-Content -Path "$env:RUNNER_TEMP\cert.pfx" -Value ([System.Convert]::FromBase64String("$env:SIGNING_CERT")) -Encoding Byte
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign /fd SHA256 /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:SIGNING_PASSWORD" /t http://timestamp.digicert.com build/bin/beidar-desktop.exe
        env:
          SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v7
        with:
          name: beidar-desktop-windows-amd64
          path: build/bin/beidar-desktop.exe
          compression-level: 0

  # ═══════════════════════════════════════════════════════════════════
  # بناء Linux AppImage (لـ LAN Server إن لزم)
  # ═══════════════════════════════════════════════════════════════════
  build-linux:
    name: Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails App
        run: wails build -platform linux/amd64 -o beidar-desktop -clean
        env:
          NODE_ENV: production

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v7
        with:
          name: beidar-desktop-linux-amd64
          path: build/bin/beidar-desktop
          compression-level: 0

  # ═══════════════════════════════════════════════════════════════════
  # إنشاء GitHub Release
  # ═══════════════════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: beidar-desktop-windows-amd64
          path: release-artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: beidar-desktop-linux-amd64
          path: release-artifacts/

      - name: Generate Release Notes
        id: release-notes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 2
            });
            const previous = tags.length > 1 ? tags[1].name : '';
            const range = previous ? `${previous}...${context.ref}` : '';
            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.ref,
              per_page: 50
            });
            let notes = `## 🚀 Beidar POS ${context.ref.replace('refs/tags/', '')}\n\n### التغييرات\n\n`;
            const categories = {
              '✨': [],
              '🐛': [],
              '🔒': [],
              '⚡': [],
              '🧹': [],
              '📦': []
            };
            for (const commit of commits) {
              const msg = commit.commit.message.split('\n')[0];
              if (msg.startsWith('feat')) categories['✨'].push(msg);
              else if (msg.startsWith('fix')) categories['🐛'].push(msg);
              else if (msg.startsWith('security')) categories['🔒'].push(msg);
              else if (msg.startsWith('perf')) categories['⚡'].push(msg);
              else if (msg.startsWith('chore')) categories['📦'].push(msg);
              else if (msg.startsWith('refactor')) categories['🧹'].push(msg);
            }
            const emojiMap = { '✨': 'ميزات جديدة', '🐛': 'إصلاح الأخطاء', '🔒': 'أمان', '⚡': 'أداء', '🧹': 'تحسينات', '📦': 'أعمال صيانة' };
            for (const [emoji, title] of Object.entries(emojiMap)) {
              const items = categories[emoji];
              if (items.length) {
                notes += `### ${emoji} ${title}\n`;
                items.forEach(i => notes += `- ${i}\n`);
                notes += '\n';
              }
            }
            notes += `---\n🖥️ **التنزيلات** متوفرة في الأسفل.\n`;
            core.setOutput('notes', notes);

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Beidar POS ${{ github.ref_name }}
          body: ${{ steps.release-notes.outputs.notes }}
          files: release-artifacts/*
          generate_release_notes: false
          draft: false
          prerelease: false
