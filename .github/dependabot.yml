version: 2
updates:
  # ── Go dependencies ──────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: sunday
      time: '04:00'
      timezone: Asia/Baghdad
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      go-minor:
        patterns:
          - '*'
        update-types:
          - minor
          - patch

  # ── npm dependencies ─────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: sunday
      time: '04:00'
      timezone: Asia/Baghdad
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      npm-minor:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: 'typescript'
        versions: ['>=5.0.0']
      - dependency-name: 'react'
        versions: ['>=19.0.0']
      - dependency-name: 'react-dom'
        versions: ['>=19.0.0']

  # ── GitHub Actions ───────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: sunday
      time: '04:00'
      timezone: Asia/Baghdad
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope
